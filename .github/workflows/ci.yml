name: CI Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Tests + Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stocksense_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: stocksense_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Run tests
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: stocksense_test
          DB_PASSWORD: test_password
          DB_NAME: stocksense_test
          MONGO_URI: mongodb://localhost:27017/stocksense_test
          JWT_SECRET: test-jwt-secret-min-32-characters-long-for-ci
          JWT_EXPIRATION: 15m
          JWT_REFRESH_EXPIRATION: 7d
          NODE_ENV: test

      - name: Build
        run: npm run build

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t stocksense-backend:${{ github.sha }} .

      - name: Smoke test Docker image
        # No esperamos una app totalmente funcional sin BD real;
        # solo verificamos que el contenedor arranque y produzca logs
        # consistentes (no crash inmediato por error de import).
        run: |
          docker run -d --name test-container \
            -e NODE_ENV=production \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_USERNAME=stocksense \
            -e DB_PASSWORD=stocksense_test \
            -e DB_NAME=stocksense \
            -e JWT_SECRET=test-secret-min-32-characters-long-for-ci-smoke \
            -e JWT_EXPIRATION=15m \
            -e JWT_REFRESH_EXPIRATION=7d \
            stocksense-backend:${{ github.sha }} || true
          sleep 5
          docker logs test-container || true
          docker stop test-container || true
          docker rm test-container || true
